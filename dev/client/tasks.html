<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务列表 - 软件学院任务系统</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app" v-cloak>
    <!-- Nav Bar -->
    <nav class="nav-bar">
      <span class="nav-brand">软件学院任务系统</span>
      <div class="nav-links">
        <span class="nav-user" v-if="user">{{ user.display_name || user.username }}</span>
        <a v-if="user && user.role === 'leader'" href="/chat.html">新建任务</a>
        <button class="btn-logout" @click="handleLogout">退出</button>
      </div>
    </nav>

    <div class="container-wide">
      <!-- Filter Bar -->
      <div class="filter-bar">
        <button
          v-for="f in filters"
          :key="f.value"
          class="filter-btn"
          :class="{ active: activeFilter === f.value }"
          @click="activeFilter = f.value"
        >{{ f.label }}</button>
      </div>

      <!-- Assignee Search + Title Filter -->
      <div class="filter-bar" style="margin-top:-12px; margin-bottom:20px; gap:8px;">
        <input v-model="searchText" placeholder="搜索负责人姓名..."
               class="filter-input" style="flex:1; max-width:200px;">
        <select v-model="titleFilter" class="filter-select">
          <option value="">全部职位</option>
          <option v-for="t in availableTitles" :key="t" :value="t">{{ t }}</option>
        </select>
      </div>

      <!-- Loading -->
      <div v-if="loading" class="loading">
        <div class="spinner"></div>
        <span>加载中...</span>
      </div>

      <!-- Empty State -->
      <div v-else-if="filteredTasks.length === 0" class="empty-state">
        <div class="empty-icon">&#x1F4CB;</div>
        <p class="empty-text">
          <template v-if="titleFilter || searchText || activeFilter !== 'all'">
            <span>没有匹配的任务</span>
            <br>
            <button class="btn" style="margin-top:8px; font-size:13px;" @click="activeFilter='all'; titleFilter=''; searchText=''">清除过滤条件</button>
          </template>
          <span v-else>暂无任务</span>
        </p>
      </div>

      <!-- Task Grid -->
      <div v-else class="task-grid">
        <div
          v-for="task in filteredTasks"
          :key="task.id"
          class="task-card"
          @click="goToDetail(task.id)"
        >
          <div class="task-card-header">
            <div class="task-card-title">{{ task.title }}</div>
            <span class="badge" :class="priorityClass(task.priority)">
              {{ priorityLabel(task.priority) }}
            </span>
          </div>

          <div v-if="task.description" style="font-size:13px; color:#666; margin-bottom:12px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">
            {{ task.description }}
          </div>

          <div class="task-card-meta">
            <span class="badge" :class="statusClass(task.status)">
              {{ statusLabel(task.status) }}
            </span>
            <span v-if="task.assignee_name">&#x1F464; {{ task.assignee_name }}</span>
            <span v-if="task.deadline">&#x1F4C5; {{ formatDeadline(task.deadline) }}</span>
            <span>&#x1F552; {{ formatDate(task.created_at) }}</span>
          </div>

          <!-- Task Actions -->
          <div class="task-actions" @click.stop>
            <!-- pending: show start button -->
            <template v-if="task.status === 'pending'">
              <button class="btn-start" @click="startTask(task)">&#x25B6; 开始任务</button>
            </template>

            <!-- in_progress: show progress controls -->
            <template v-else-if="task.status === 'in_progress'">
              <div class="progress-section">
                <div class="progress-bar-track">
                  <div class="progress-bar-fill" :style="{ width: (task.progress_percent || 0) + '%' }"></div>
                </div>
                <span class="progress-pct">{{ task.progress_percent || 0 }}%</span>
              </div>
              <div v-if="editingTaskId === task.id" class="progress-edit">
                <div v-if="showingLogsForId === task.id && progressLogs.length > 0" class="progress-timeline">
                  <div class="timeline-title">进度记录</div>
                  <div v-for="log in progressLogs" :key="log.id" class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                      <span class="timeline-pct">{{ log.percent }}%</span>
                      <span class="timeline-note" v-if="log.note">{{ log.note }}</span>
                      <span class="timeline-time">{{ formatDate(log.created_at) }}</span>
                    </div>
                  </div>
                </div>
                <div class="progress-range-row">
                  <span>进度</span>
                  <input type="range" min="0" max="100" step="5" v-model.number="editPercent">
                  <span class="progress-pct">{{ editPercent }}%</span>
                </div>
                <input class="progress-input" type="text" v-model="editNote" placeholder="进度备注...">
                <div class="progress-edit-actions">
                  <button class="btn-save-progress" @click="saveProgress(task)">保存进度</button>
                  <button class="btn-complete" @click="completeTask(task)">&#x2713; 标记完成</button>
                  <button class="btn-cancel-edit" @click="cancelEdit()">取消</button>
                </div>
              </div>
              <div v-else class="progress-edit-actions">
                <button class="btn-edit-progress" @click="openEdit(task)">编辑进度</button>
                <button class="btn-complete" @click="completeTask(task)">&#x2713; 标记完成</button>
              </div>
            </template>

            <!-- completed: show label -->
            <template v-else-if="task.status === 'completed'">
              <div class="completed-label">&#x2713; 已完成</div>
              <div v-if="task.progress_note" class="completed-note">{{ task.progress_note }}</div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/vue.global.prod.js"></script>
  <script src="/common.js"></script>
  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
      setup() {
        const user = ref(null);
        const tasks = ref([]);
        const loading = ref(true);
        const activeFilter = ref('all');
        const editingTaskId = ref(null);
        const editPercent = ref(0);
        const editNote = ref('');
        const searchText = ref('');
        const titleFilter = ref('');
        const progressLogs = ref([]);
        const showingLogsForId = ref(null);
        const logsLoading = ref(false);

        const filters = [
          { label: '全部', value: 'all' },
          { label: '待处理', value: 'pending' },
          { label: '进行中', value: 'in_progress' },
          { label: '已完成', value: 'completed' },
          { label: '会议', value: 'meeting' }
        ];

        const filterLabel = computed(() => {
          const f = filters.find(f => f.value === activeFilter.value);
          return f ? f.label : '';
        });

        const availableTitles = computed(() => {
          const titles = new Set();
          for (const t of tasks.value) {
            if (t.assignee_name) {
              if (t.assignee_name.includes('-')) {
                titles.add(t.assignee_name.split('-')[0]);
              } else {
                titles.add(t.assignee_name);
              }
            }
          }
          return [...titles].sort();
        });

        const filteredTasks = computed(() => {
          let list = tasks.value;

          // "会议"按钮：按 task_type 过滤
          if (activeFilter.value === 'meeting') {
            list = list.filter(t => t.task_type === 'meeting');
          }
          // 状态过滤
          else if (activeFilter.value !== 'all') {
            list = list.filter(t => t.status === activeFilter.value);
          }

          // 职位过滤
          if (titleFilter.value) {
            list = list.filter(t =>
              t.assignee_name && t.assignee_name.includes(titleFilter.value)
            );
          }

          // 姓名搜索
          if (searchText.value) {
            const q = searchText.value.toLowerCase();
            list = list.filter(t =>
              t.assignee_name && t.assignee_name.toLowerCase().includes(q)
            );
          }

          return list;
        });

        function handleLogout() {
          logout();
        }

        function goToDetail(id) {
          window.location.href = '/task-detail.html?id=' + id;
        }

        function priorityClass(p) {
          const map = { high: 'badge-high', medium: 'badge-medium', low: 'badge-low' };
          return map[p] || 'badge-medium';
        }

        function priorityLabel(p) {
          const map = { high: '高', medium: '中', low: '低' };
          return map[p] || p;
        }

        function statusClass(s) {
          const map = {
            pending: 'status-pending',
            in_progress: 'status-in_progress',
            completed: 'status-completed'
          };
          return map[s] || 'status-pending';
        }

        function statusLabel(s) {
          const map = {
            pending: '待处理',
            in_progress: '进行中',
            completed: '已完成'
          };
          return map[s] || s;
        }

        function formatDeadline(dateStr) {
          if (!dateStr) return '';
          const d = new Date(dateStr);
          return d.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
        }

        async function fetchTasks() {
          loading.value = true;
          try {
            const data = await apiFetch(API_BASE + '/tasks');
            tasks.value = Array.isArray(data) ? data : (data.tasks || []);
          } catch (e) {
            console.error('Failed to fetch tasks:', e);
            tasks.value = [];
          } finally {
            loading.value = false;
          }
        }

        async function updateStatus(task, status, note, percent) {
          const body = { status };
          if (note !== undefined) body.progress_note = note;
          if (percent !== undefined) body.progress_percent = percent;
          await apiFetch(API_BASE + '/tasks/' + task.id + '/status', {
            method: 'PATCH',
            body: JSON.stringify(body),
          });
          task.status = status;
          if (note !== undefined) task.progress_note = note;
          if (percent !== undefined) task.progress_percent = percent;
          editingTaskId.value = null;
        }

        async function startTask(task) {
          await updateStatus(task, 'in_progress', '', 0);
        }

        async function openEdit(task) {
          editPercent.value = task.progress_percent || 0;
          editNote.value = task.progress_note || '';
          editingTaskId.value = task.id;
          showingLogsForId.value = task.id;
          logsLoading.value = true;
          try {
            const data = await apiFetch(API_BASE + '/tasks/' + task.id + '/progress-logs');
            progressLogs.value = data.logs || [];
          } catch (e) {
            progressLogs.value = [];
          } finally {
            logsLoading.value = false;
          }
        }

        function cancelEdit() {
          editingTaskId.value = null;
          showingLogsForId.value = null;
          progressLogs.value = [];
        }

        async function saveProgress(task) {
          await updateStatus(task, 'in_progress', editNote.value, editPercent.value);
          showingLogsForId.value = null;
          progressLogs.value = [];
        }

        async function completeTask(task) {
          await updateStatus(task, 'completed', editNote.value || task.progress_note, 100);
        }

        onMounted(() => {
          if (!requireAuth()) return;
          user.value = getUser();
          fetchTasks();
        });

        return {
          user,
          tasks,
          loading,
          activeFilter,
          filters,
          filterLabel,
          filteredTasks,
          availableTitles,
          searchText,
          titleFilter,
          editingTaskId,
          editPercent,
          editNote,
          progressLogs,
          showingLogsForId,
          logsLoading,
          handleLogout,
          goToDetail,
          priorityClass,
          priorityLabel,
          statusClass,
          statusLabel,
          formatDeadline,
          formatDate,
          startTask,
          openEdit,
          cancelEdit,
          saveProgress,
          completeTask
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
